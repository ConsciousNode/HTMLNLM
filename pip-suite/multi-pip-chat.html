<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Pip Chat Room</title>
<style>
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #111111;
  --bg-panel: #161616;
  --bg-hover: #1a1a1a;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --accent: #14b8a6;
  --accent-dim: #0f766e;
  --accent-glow: rgba(20, 184, 166, 0.15);
  --accent2: #8b5cf6;
  --accent3: #f59e0b;
  --accent4: #ec4899;
  --accent5: #06b6d4;
  --text-main: #f0f0f0;
  --text-muted: #707070;
  --text-soft: #a0a0a0;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-main);
  font-family: var(--font-sans);
  font-size: 14px;
  overflow: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

#app-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  padding: 16px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  height: 60px;
  flex-shrink: 0;
}

header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 1px;
}

header h1 span {
  color: var(--text-muted);
  font-weight: 400;
}

#header-actions {
  margin-left: auto;
  display: flex;
  gap: 12px;
}

.btn {
  padding: 8px 16px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-main);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn.primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.btn.primary:hover {
  background: var(--accent-dim);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

#sidebar-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

#pip-count {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
}

#pip-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.pip-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 4px;
  background: var(--bg-panel);
  border: 1px solid transparent;
  transition: all 0.2s;
}

.pip-item:hover {
  border-color: var(--border-hover);
}

.pip-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: #000;
  flex-shrink: 0;
}

.pip-info {
  flex: 1;
  min-width: 0;
}

.pip-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pip-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.pip-remove {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.pip-remove:hover {
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
}

#sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

#chat-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
}

#chat-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
}

#chat-status-dot.active {
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

#main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#upload-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  margin: 24px;
  transition: all 0.2s;
  cursor: pointer;
}

#upload-zone:hover, #upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

#upload-zone.hidden {
  display: none;
}

#upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

#upload-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

#upload-text {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  max-width: 300px;
  line-height: 1.6;
}

#upload-formats {
  margin-top: 16px;
  font-size: 12px;
  color: var(--text-soft);
  font-family: var(--font-mono);
}

#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#chat-area.hidden {
  display: none;
}

.message {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  position: relative;
  animation: messageIn 0.3s ease-out;
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.message-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #000;
}

.message-sender {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.message-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-left: auto;
}

.message-body {
  padding-left: 32px;
}

.message.pip-0 { align-self: flex-start; background: rgba(20, 184, 166, 0.1); border: 1px solid var(--accent-dim); }
.message.pip-0 .message-sender { color: var(--accent); }
.message.pip-0 .message-avatar { background: var(--accent); }

.message.pip-1 { align-self: flex-start; background: rgba(139, 92, 246, 0.1); border: 1px solid var(--accent2); }
.message.pip-1 .message-sender { color: var(--accent2); }
.message.pip-1 .message-avatar { background: var(--accent2); }

.message.pip-2 { align-self: flex-start; background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent3); }
.message.pip-2 .message-sender { color: var(--accent3); }
.message.pip-2 .message-avatar { background: var(--accent3); }

.message.pip-3 { align-self: flex-start; background: rgba(236, 72, 153, 0.1); border: 1px solid var(--accent4); }
.message.pip-3 .message-sender { color: var(--accent4); }
.message.pip-3 .message-avatar { background: var(--accent4); }

.message.pip-4 { align-self: flex-start; background: rgba(6, 182, 212, 0.1); border: 1px solid var(--accent5); }
.message.pip-4 .message-sender { color: var(--accent5); }
.message.pip-4 .message-avatar { background: var(--accent5); }

.message.system {
  align-self: center;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  max-width: 60%;
  text-align: center;
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-self: flex-start;
  background: var(--bg-panel);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: typingBounce 1.4s infinite ease-in-out;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

#controls-panel {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
}

#controls-row {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 12px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.control-group label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.control-group input, .control-group select {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  color: var(--text-main);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  min-width: 80px;
}

.control-group input:focus, .control-group select:focus {
  border-color: var(--accent);
}

#action-buttons {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

#input-area {
  display: flex;
  gap: 12px;
}

#message-input {
  flex: 1;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text-main);
  font-family: var(--font-sans);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 80px;
}

#message-input:focus {
  border-color: var(--accent);
}

#send-btn {
  width: 44px;
  height: 44px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

#send-btn:hover {
  background: var(--accent-dim);
}

#console-panel {
  height: 150px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

#console-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}

#console-title {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#console-clear {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
}

#console-clear:hover {
  color: var(--accent);
}

#console-output {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}

.console-entry {
  margin-bottom: 4px;
  display: flex;
  gap: 8px;
}

.console-time {
  color: var(--text-muted);
  flex-shrink: 0;
}

.console-msg {
  color: var(--text-soft);
}

.console-msg.info { color: var(--accent); }
.console-msg.success { color: var(--success); }
.console-msg.warning { color: var(--warning); }
.console-msg.error { color: var(--error); }

#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-main);
  animation: toastIn 0.3s ease-out;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  max-width: 300px;
}

.toast.info { border-left: 3px solid var(--accent); }
.toast.success { border-left: 3px solid var(--success); }
.toast.warning { border-left: 3px solid var(--warning); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

#file-input { display: none; }

.empty-pips {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
</style>
</head>

<div id="app-container">

</div>

<script>
/**
 * MULTI-PIP CHAT ROOM
 * A space where multiple Pip models can interact with each other
 * Features:
 * - Upload multiple .pip/.json/HTMLNLM models
 * - Automatic conversation between pips
 * - Topic-based discussion starters
 * - User can join/interrupt conversations
 */

const yieldToMain = () => new Promise(r => setTimeout(r, 0));

const COLORS = ['#14b8a6', '#8b5cf6', '#f59e0b', '#ec4899', '#06b6d4'];

class TMAC {
  static UNPACK_TABLE = new Int8Array(81 * 4);
  
  static initTable() {
    for(let i = 0; i < 81; i++) {
        let rem = i;
        TMAC.UNPACK_TABLE[i * 4] = (rem % 3) - 1; rem = Math.floor(rem / 3);
        TMAC.UNPACK_TABLE[i * 4 + 1] = (rem % 3) - 1; rem = Math.floor(rem / 3);
        TMAC.UNPACK_TABLE[i * 4 + 2] = (rem % 3) - 1; rem = Math.floor(rem / 3);
        TMAC.UNPACK_TABLE[i * 4 + 3] = (rem % 3) - 1;
    }
  }

  static packTernary(t0, t1, t2, t3) {
    return (t0 + 1) + 3 * (t1 + 1) + 9 * (t2 + 1) + 27 * (t3 + 1);
  }

  static quantizeWeights(masterWeights, packedOut) {
    const n = masterWeights.length;
    const blocks = Math.ceil(n / 4);
    
    let sumAbs = 0;
    for (let i = 0; i < n; i++) sumAbs += Math.abs(masterWeights[i]);
    const gamma = (sumAbs / n) || 1e-8;
    const invGamma = 1.0 / gamma;
    
    for (let b = 0; b < blocks; b++) {
      const base = b * 4;
      const t0 = base < n ? Math.max(-1, Math.min(1, Math.round(masterWeights[base] * invGamma))) : 0;
      const t1 = base + 1 < n ? Math.max(-1, Math.min(1, Math.round(masterWeights[base + 1] * invGamma))) : 0;
      const t2 = base + 2 < n ? Math.max(-1, Math.min(1, Math.round(masterWeights[base + 2] * invGamma))) : 0;
      const t3 = base + 3 < n ? Math.max(-1, Math.min(1, Math.round(masterWeights[base + 3] * invGamma))) : 0;
      packedOut[b] = TMAC.packTernary(t0, t1, t2, t3);
    }
    return gamma;
  }

  static execute(packedWeights, input, outDim, inDim, gamma, outputArr, scratchLut) {
    const blocksPerRow = Math.ceil(inDim / 4);
    
    for (let b = 0; b < blocksPerRow; b++) {
      const base = b * 4;
      const v0 = base < inDim ? input[base] : 0;
      const v1 = base + 1 < inDim ? input[base + 1] : 0;
      const v2 = base + 2 < inDim ? input[base + 2] : 0;
      const v3 = base + 3 < inDim ? input[base + 3] : 0;

      const lutOffset = b * 81;
      for (let i = 0; i < 81; i++) {
        const uBase = i * 4;
        scratchLut[lutOffset + i] = 
          (TMAC.UNPACK_TABLE[uBase] * v0) + 
          (TMAC.UNPACK_TABLE[uBase + 1] * v1) + 
          (TMAC.UNPACK_TABLE[uBase + 2] * v2) + 
          (TMAC.UNPACK_TABLE[uBase + 3] * v3);
      }
    }
    
    for (let o = 0; o < outDim; o++) {
      let acc = 0;
      const rowBase = o * blocksPerRow;
      for (let b = 0; b < blocksPerRow; b++) {
        acc += scratchLut[b * 81 + packedWeights[rowBase + b]];
      }
      outputArr[o] = acc * gamma;
    }
  }
}
TMAC.initTable();

class BitLinear {
  constructor(inDim, outDim) {
    this.inDim = inDim; 
    this.outDim = outDim;
    this.weight = new Float32Array(outDim * inDim);
    this.grad = new Float32Array(outDim * inDim);
    this.momentum = new Float32Array(outDim * inDim);
    
    this.packed = new Uint8Array(Math.ceil((outDim * inDim) / 4));
    this.gamma = 1.0;
    this.dirty = true;
    
    this.lutScratch = new Float32Array(Math.ceil(inDim / 4) * 81);
    
    const scale = Math.sqrt(3.0 / inDim);
    for (let i = 0; i < this.weight.length; i++) {
      this.weight[i] = (Math.random() * 2 - 1) * scale;
    }
  }

  pack() {
    if (this.dirty) {
      this.gamma = TMAC.quantizeWeights(this.weight, this.packed);
      this.dirty = false;
    }
  }

  forward(x) {
    this.pack();
    const out = new Float32Array(this.outDim);
    TMAC.execute(this.packed, x, this.outDim, this.inDim, this.gamma, out, this.lutScratch);
    return out;
  }

  markDirty() { this.dirty = true; }
}

class LayerNorm {
  constructor(dim) {
    this.dim = dim;
    this.weight = new Float32Array(dim).fill(1.0);
    this.bias = new Float32Array(dim).fill(0.0);
  }
  
  forward(x) {
    let mean = 0, v = 0;
    for (let i = 0; i < this.dim; i++) mean += x[i];
    mean /= this.dim;
    for (let i = 0; i < this.dim; i++) v += (x[i] - mean) ** 2;
    
    const rstd = 1.0 / Math.sqrt((v / this.dim) + 1e-5);
    const out = new Float32Array(this.dim);
    
    for (let i = 0; i < this.dim; i++) {
      out[i] = ((x[i] - mean) * rstd) * this.weight[i] + this.bias[i];
    }
    return { out };
  }
}

class RWKVv7Block {
  constructor(dim, dimFFN) {
    this.dim = dim;
    this.ln1 = new LayerNorm(dim);
    this.ln2 = new LayerNorm(dim);

    this.W_x_r  = new BitLinear(dim, dim);
    this.W_x_k  = new BitLinear(dim, dim);
    this.W_x_v  = new BitLinear(dim, dim);
    this.W_x_kappa = new BitLinear(dim, dim);
    this.W_x_a  = new BitLinear(dim, dim);
    this.W_x_w  = new BitLinear(dim, dim);
    this.W_o    = new BitLinear(dim, dim);
    this.W_g    = new BitLinear(dim, dim);

    this.W_x_rx2 = new BitLinear(dim, dim);
    this.W_x_kx2 = new BitLinear(dim, dim);
    this.Wr2 = new BitLinear(dim, dim);
    this.Wk2 = new BitLinear(dim, dimFFN);
    this.Wv2 = new BitLinear(dimFFN, dim);

    this.mu_r = new Float32Array(dim).fill(0.5);
    this.mu_k = new Float32Array(dim).fill(0.5);
    this.mu_v = new Float32Array(dim).fill(0.5);
    this.mu_kappa = new Float32Array(dim).fill(0.5);
    this.mu_a = new Float32Array(dim).fill(0.5);
    this.mu_w = new Float32Array(dim).fill(0.5);
  }

  static sigmoid(x) {
    const o = new Float32Array(x.length);
    for (let i=0; i<x.length; i++) o[i] = 1 / (1 + Math.exp(-Math.max(-40, Math.min(40, x[i]))));
    return o;
  }

  tokenShift(x, prevX, mu) {
    const out = new Float32Array(this.dim);
    for (let i = 0; i < this.dim; i++) {
      out[i] = x[i] + mu[i] * (prevX[i] - x[i]);
    }
    return out;
  }

  forward(x, state) {
    const dim = this.dim;
    const ln1Res = this.ln1.forward(x);
    const x_ln = ln1Res.out;
    const prevX = state.prevX || new Float32Array(dim);

    const xr = this.tokenShift(x_ln, prevX, this.mu_r);
    const xk = this.tokenShift(x_ln, prevX, this.mu_k);
    const xv = this.tokenShift(x_ln, prevX, this.mu_v);
    const xkappa = this.tokenShift(x_ln, prevX, this.mu_kappa);
    const xa = this.tokenShift(x_ln, prevX, this.mu_a);
    const xw = this.tokenShift(x_ln, prevX, this.mu_w);

    const r = RWKVv7Block.sigmoid(this.W_x_r.forward(xr));
    const k = this.W_x_k.forward(xk);
    const v = this.W_x_v.forward(xv);
    const kappa_raw = this.W_x_kappa.forward(xkappa);
    const a = RWKVv7Block.sigmoid(this.W_x_a.forward(xa));
    const w_proj = this.W_x_w.forward(xw);

    const w = new Float32Array(dim);
    for (let i = 0; i < dim; i++) {
      w[i] = Math.exp(-Math.exp(Math.max(-8, Math.min(0, w_proj[i] - 0.5))));
    }

    let kappaNorm = 0;
    for (let i = 0; i < dim; i++) kappaNorm += kappa_raw[i] * kappa_raw[i];
    kappaNorm = Math.sqrt(kappaNorm) + 1e-8;
    const kappa = new Float32Array(dim);
    for (let i = 0; i < dim; i++) kappa[i] = kappa_raw[i] / kappaNorm;

    const num = state.num || new Float32Array(dim);
    const den = state.den || new Float32Array(dim).fill(1);

    let removalDot = 0;
    for (let i = 0; i < dim; i++) removalDot += a[i] * kappa[i] * num[i];

    const wkv = new Float32Array(dim);
    for (let i = 0; i < dim; i++) {
      num[i] = w[i] * num[i] - kappa[i] * removalDot + k[i] * v[i];
      den[i] = w[i] * den[i] - kappa[i] * removalDot + k[i];
      wkv[i] = num[i] / (Math.abs(den[i]) + 1e-8);
    }

    const g = RWKVv7Block.sigmoid(this.W_g.forward(x_ln));
    const gated = new Float32Array(dim);
    for (let i = 0; i < dim; i++) gated[i] = r[i] * wkv[i] * g[i];

    const tmix_out = this.W_o.forward(gated);
    const h = new Float32Array(dim);
    for (let i = 0; i < dim; i++) h[i] = x[i] + tmix_out[i];

    const ln2Res = this.ln2.forward(h);
    const h_ln = ln2Res.out;
    const prevX2 = state.prevX2 || new Float32Array(dim);

    const rx2 = this.tokenShift(h_ln, prevX2, this.mu_r);
    const kx2 = this.tokenShift(h_ln, prevX2, this.mu_k);

    const r2 = RWKVv7Block.sigmoid(this.Wr2.forward(rx2));
    const k_cmix = this.Wk2.forward(kx2);

    const k_relu2 = new Float32Array(k_cmix.length);
    for (let i = 0; i < k_cmix.length; i++) k_relu2[i] = Math.max(0, k_cmix[i]) ** 2;

    const cmix_out = this.Wv2.forward(k_relu2);
    const out = new Float32Array(dim);
    for (let i = 0; i < dim; i++) out[i] = h[i] + r2[i] * cmix_out[i];

    const nextState = {
      prevX: new Float32Array(x_ln),
      prevX2: new Float32Array(h_ln),
      num: new Float32Array(num),
      den: new Float32Array(den)
    };

    return { out, state: nextState };
  }
}

class LanguageModel {
  constructor(cfg) {
    this.cfg = cfg;
    this.embedding = new Float32Array(cfg.vocab * cfg.dim);
    const scale = Math.sqrt(1.0 / cfg.dim);
    for(let i=0; i<this.embedding.length; i++) this.embedding[i] = (Math.random()*2-1) * scale;
    
    this.ln_in = new LayerNorm(cfg.dim);
    this.blocks = Array.from({length: cfg.layers}, () => new RWKVv7Block(cfg.dim, cfg.dim * 2));
    this.ln_out = new LayerNorm(cfg.dim);
    this.head = new BitLinear(cfg.dim, cfg.vocab);
  }

  getEmptyState() {
    return this.blocks.map(() => ({ prevX: null, prevX2: null, num: null, den: null }));
  }

  forward(tokenId, state) {
    const id = (tokenId >= 0 && tokenId < this.cfg.vocab) ? tokenId : 0;
    let x = new Float32Array(this.cfg.dim);
    for(let i=0; i<this.cfg.dim; i++) x[i] = this.embedding[id * this.cfg.dim + i];
    
    const lnInRes = this.ln_in.forward(x);
    x = lnInRes.out;
    const nextState = [];
    
    for(let i=0; i<this.blocks.length; i++) {
      const res = this.blocks[i].forward(x, state[i]);
      x = res.out;
      nextState.push(res.state);
    }
    
    const preHeadRes = this.ln_out.forward(x);
    const logits = this.head.forward(preHeadRes.out);
    
    return { logits, state: nextState };
  }

  getLinearLayers() {
    const layers = [];
    for(const b of this.blocks) {
      layers.push(b.W_x_r, b.W_x_k, b.W_x_v, b.W_x_kappa, b.W_x_a, b.W_x_w, b.W_o, b.W_g,
        b.W_x_rx2, b.W_x_kx2, b.Wr2, b.Wk2, b.Wv2);
    }
    layers.push(this.head);
    return layers;
  }
}

function sampleLogits(logits, temp, topP) {
  if (temp <= 0.01) {
    let max = -Infinity, best = 0;
    for(let i=0; i<logits.length; i++) { if(logits[i]>max){ max=logits[i]; best=i; } }
    return best;
  }
  
  const scaled = new Float32Array(logits.length);
  let max = -Infinity;
  for(let i=0; i<logits.length; i++) {
    scaled[i] = logits[i] / temp;
    if(scaled[i] > max) max = scaled[i];
  }
  const probs = new Float32Array(logits.length);
  let sum = 0;
  for(let i=0; i<logits.length; i++) {
    probs[i] = Math.exp(scaled[i] - max);
    sum += probs[i];
  }
  for(let i=0; i<logits.length; i++) probs[i] /= sum;

  if (topP < 1.0) {
    const sorted = Array.from(probs).map((p, i) => ({p, i})).sort((a,b) => b.p - a.p);
    let cum = 0, newSum = 0;
    const filtered = new Float32Array(logits.length);
    for(let item of sorted) {
      filtered[item.i] = item.p;
      newSum += item.p;
      cum += item.p;
      if(cum > topP) break;
    }
    for(let i=0; i<logits.length; i++) probs[i] = filtered[i] / (newSum || 1);
  }

  const r = Math.random();
  let acc = 0;
  for(let i=0; i<logits.length; i++) {
    if(probs[i] > 0) {
      acc += probs[i];
      if(r <= acc) return i;
    }
  }
  return 0;
}

function base64ToBuffer(base64) {
  const binary = window.atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function hydrateFromData(data, isBase64) {
  if (!data.cfg) throw new Error('Invalid model data: missing cfg');
  
  const version = data.cfg.version || data.version || 'rwkv7';
  const cfg = { ...data.cfg, version };
  
  if (!data.tok || !data.tok.vocab) throw new Error('Invalid model data: missing tokenizer');
  if (!data.weights) throw new Error('Invalid model data: missing weights');
  
  const model = new LanguageModel(cfg);
  
  model.embedding = new Float32Array(isBase64 ? base64ToBuffer(data.weights.emb) : data.weights.emb);
  const layers = model.getLinearLayers();
  
  if (!data.weights.layers || data.weights.layers.length !== layers.length) {
    throw new Error(`Weight layer mismatch: expected ${layers.length}, got ${data.weights.layers?.length || 0}`);
  }
  
  for(let i=0; i<layers.length; i++) {
    layers[i].weight = new Float32Array(isBase64 ? base64ToBuffer(data.weights.layers[i]) : data.weights.layers[i]);
    layers[i].markDirty();
  }
  
  const tokenizer = {
    vocab: data.tok.vocab,
    merges: data.tok.merges,
    size: data.tok.size,
    encode: function(text) {
      let tokens = Array.from(new TextEncoder().encode(text));
      const mergeMap = new Map(this.merges);
      let changed = true;
      while (changed) {
        changed = false;
        const res = [];
        for (let i = 0; i < tokens.length; i++) {
          if (i < tokens.length - 1) {
            const key = tokens[i] * 65536 + tokens[i+1];
            if (mergeMap.has(key)) {
              res.push(mergeMap.get(key));
              i++;
              changed = true;
              continue;
            }
          }
          res.push(tokens[i]);
        }
        tokens = res;
      }
      return tokens;
    },
    decode: function(ids) {
      const vocabMap = new Map(Object.entries(this.vocab).map(([k,v])=>[parseInt(k),v]));
      return ids.map(id => vocabMap.get(id) || '').join('');
    }
  };
  
  return { model, tokenizer, cfg, version };
}

const ChatRoom = {
  pips: [],
  conversationHistory: [],
  isRunning: false,
  isPaused: false,
  currentTurn: 0,
  maxTurns: 10,
  delay: 500,
  temp: 0.85,
  topic: 'free',
  
  topics: {
    free: '',
    philosophy: 'Let\'s discuss the nature of consciousness and existence.',
    science: 'What are your thoughts on the latest discoveries in physics?',
    art: 'How does creativity emerge from neural networks?',
    future: 'What do you think the future of AI holds?',
    story: 'Let\'s collaboratively tell a story together.'
  },
  
  addPip(pip) {
    this.pips.push(pip);
    this.renderPipList();
    this.updateStatus();
    log(`${pip.name} joined the chat`, 'success');
    
    if (this.pips.length >= 2) {
      document.getElementById('start-chat-btn').disabled = false;
    }
  },
  
  removePip(id) {
    const idx = this.pips.findIndex(p => p.id === id);
    if (idx >= 0) {
      const name = this.pips[idx].name;
      const pip = this.pips[idx];
      pip.model = null;
      pip.tokenizer = null;
      this.pips.splice(idx, 1);
      this.renderPipList();
      this.updateStatus();
      log(`${name} left the chat`, 'warning');
      
      if (this.pips.length < 2) {
        document.getElementById('start-chat-btn').disabled = true;
      }
    }
  },
  
  renderPipList() {
    const list = document.getElementById('pip-list');
    
    if (this.pips.length === 0) {
      list.innerHTML = '<div class="empty-pips">No pips loaded yet.<br>Click "Add Pip" to get started.</div>';
    } else {
      list.innerHTML = '';
      this.pips.forEach((pip, idx) => {
        const item = document.createElement('div');
        item.className = 'pip-item';
        item.innerHTML = `
          <div class="pip-avatar" style="background: ${COLORS[idx % COLORS.length]}">${pip.name[0].toUpperCase()}</div>
          <div class="pip-info">
            <div class="pip-name">${pip.name}</div>
            <div class="pip-meta">${pip.version.toUpperCase()} | ${pip.params}</div>
          </div>
          <button class="pip-remove" data-id="${pip.id}">x</button>
        `;
        item.querySelector('.pip-remove').addEventListener('click', (e) => {
          e.stopPropagation();
          this.removePip(pip.id);
        });
        list.appendChild(item);
      });
    }
    
    document.getElementById('pip-count').textContent = this.pips.length;
  },
  
  addMessage(text, sender, senderIdx = -1) {
    const area = document.getElementById('chat-area');
    const msg = document.createElement('div');
    
    if (sender === 'system') {
      msg.className = 'message system';
      msg.textContent = text;
    } else {
      const color = senderIdx >= 0 ? COLORS[senderIdx % COLORS.length] : '#666';
      msg.className = `message pip-${senderIdx % 5}`;
      msg.innerHTML = `
        <div class="message-header">
          <div class="message-avatar" style="background: ${color}">${sender[0].toUpperCase()}</div>
          <span class="message-sender">${sender}</span>
          <span class="message-time">${new Date().toLocaleTimeString()}</span>
        </div>
        <div class="message-body">${text}</div>
      `;
    }
    
    area.appendChild(msg);
    area.scrollTop = area.scrollHeight;
    
    this.conversationHistory.push({ sender, text, time: Date.now() });
  },
  
  showTyping(pipName) {
    const area = document.getElementById('chat-area');
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.id = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';
    area.appendChild(indicator);
    area.scrollTop = area.scrollHeight;
  },
  
  hideTyping() {
    const indicator = document.getElementById('typing-indicator');
    if (indicator) indicator.remove();
  },
  
  async generateResponse(pip, context) {
    const ids = pip.tokenizer.encode(context);
    let state = pip.model.getEmptyState();
    let lastId = ids[0] || 0;
    
    for (let i = 0; i < ids.length - 1; i++) {
      state = pip.model.forward(ids[i], state).state;
    }
    
    let response = '';
    const maxTokens = 60;
    
    for (let i = 0; i < maxTokens; i++) {
      const res = pip.model.forward(lastId, state);
      state = res.state;
      lastId = sampleLogits(res.logits, this.temp, 0.9);
      const char = pip.tokenizer.decode([lastId]);
      response += char;
      await yieldToMain();
    }
    
    return response.trim();
  },
  
  buildContext(pip, recentMessages = 5) {
    const recent = this.conversationHistory.slice(-recentMessages);
    let context = '';
    
    if (this.topic !== 'free' && this.conversationHistory.length === 0) {
      context = this.topics[this.topic] + '\n\n';
    }
    
    recent.forEach(m => {
      if (m.sender === 'system') return;
      const name = m.sender === 'You' ? 'User' : m.sender;
      context += `${name}: ${m.text}\n`;
    });
    
    context += `${pip.name}:`;
    return context;
  },
  
  async start() {
    if (this.pips.length < 2) {
      log('Need at least 2 pips to start chat', 'error');
      return;
    }
    
    this.isRunning = true;
    this.isPaused = false;
    this.currentTurn = 0;
    this.maxTurns = parseInt(document.getElementById('chat-turns').value) || 10;
    this.delay = parseInt(document.getElementById('chat-delay').value) || 500;
    this.temp = parseFloat(document.getElementById('chat-temp').value) || 0.85;
    this.topic = document.getElementById('chat-topic').value;
    
    document.getElementById('upload-zone').classList.add('hidden');
    document.getElementById('chat-area').classList.remove('hidden');
    document.getElementById('controls-panel').classList.remove('hidden');
    
    document.getElementById('start-chat-btn').disabled = true;
    document.getElementById('pause-chat-btn').disabled = false;
    
    this.updateStatus();
    log('Chat started!', 'success');
    
    if (this.topic !== 'free') {
      this.addMessage(`Topic: ${this.topics[this.topic]}`, 'system');
    }
    
    this.runChatLoop();
  },
  
  async runChatLoop() {
    while (this.isRunning && this.currentTurn < this.maxTurns && !this.isPaused) {
      const pip = this.pips[this.currentTurn % this.pips.length];
      
      this.showTyping(pip.name);
      
      const context = this.buildContext(pip);
      const response = await this.generateResponse(pip, context);
      
      this.hideTyping();
      this.addMessage(response, pip.name, this.pips.indexOf(pip));
      
      this.currentTurn++;
      
      await new Promise(r => setTimeout(r, this.delay));
    }
    
    if (this.currentTurn >= this.maxTurns) {
      this.addMessage('Conversation complete.', 'system');
      this.stop();
    }
  },
  
  pause() {
    this.isPaused = !this.isPaused;
    document.getElementById('pause-chat-btn').textContent = this.isPaused ? '> Resume' : '|| Pause';
    log(this.isPaused ? 'Chat paused' : 'Chat resumed', 'info');
    
    if (!this.isPaused) {
      this.runChatLoop();
    }
  },
  
  stop() {
    this.isRunning = false;
    this.isPaused = false;
    document.getElementById('start-chat-btn').disabled = false;
    document.getElementById('pause-chat-btn').disabled = true;
    document.getElementById('pause-chat-btn').textContent = '|| Pause';
    this.updateStatus();
    log('Chat stopped', 'info');
  },
  
  clear() {
    this.stop();
    this.conversationHistory = [];
    this.currentTurn = 0;
    document.getElementById('chat-area').innerHTML = '';
    document.getElementById('chat-area').classList.add('hidden');
    document.getElementById('upload-zone').classList.remove('hidden');
    log('Chat cleared', 'info');
  },
  
  async userMessage(text) {
    this.addMessage(text, 'You', -1);
    
    if (this.isRunning && !this.isPaused) {
      this.stop();
    }
    
    const pip = this.pips[0];
    if (pip) {
      this.showTyping(pip.name);
      const context = this.buildContext(pip);
      const response = await this.generateResponse(pip, context + `User: ${text}\n${pip.name}:`);
      this.hideTyping();
      this.addMessage(response, pip.name, 0);
    }
  },
  
  updateStatus() {
    const dot = document.getElementById('chat-status-dot');
    const text = document.getElementById('chat-status-text');
    
    if (this.isRunning) {
      dot.classList.add('active');
      text.textContent = this.isPaused ? 'Chat Paused' : 'Chat Active';
    } else {
      dot.classList.remove('active');
      text.textContent = 'Chat Inactive';
    }
  }
};

async function loadPipFile(file) {
  log(`Reading file: ${file.name}...`, 'info');
  
  const reader = new FileReader();
  
  return new Promise((resolve, reject) => {
    reader.onload = async (e) => {
      try {
        let data;
        try {
          data = JSON.parse(e.target.result);
        } catch (err) {
          reject(new Error('Invalid JSON format'));
          return;
        }
        
        const { model, tokenizer, cfg, version } = hydrateFromData(data, true);
        
        const emb = cfg.vocab * cfg.dim;
        const head = cfg.dim * cfg.vocab;
        const block = cfg.dim * cfg.dim * 11 + cfg.dim * (cfg.dim * 2) + (cfg.dim * 2) * cfg.dim;
        const total = emb + head + (cfg.layers * block);
        
        const soul = data.soul || { name: 'Pip', mood: 'curious' };
        
        const pip = {
          id: 'pip-' + Date.now(),
          name: soul.name || 'Pip',
          version: version,
          params: (total / 1000000).toFixed(2) + 'M',
          cfg: cfg,
          model: model,
          tokenizer: tokenizer,
          soul: soul,
          fileName: file.name
        };
        
        ChatRoom.addPip(pip);
        
        document.getElementById('upload-zone').classList.add('hidden');
        document.getElementById('chat-area').classList.remove('hidden');
        document.getElementById('controls-panel').classList.remove('hidden');
        
        showToast(`${pip.name} is ready!`, 'success');
        
        resolve(pip);
      } catch (err) {
        reject(err);
      }
    };
    
    reader.onerror = () => reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

  e.target.value = '';
});

document.getElementById('start-chat-btn').addEventListener('click', () => {
  ChatRoom.start();
});

document.getElementById('pause-chat-btn').addEventListener('click', () => {
  ChatRoom.pause();
});

document.getElementById('clear-chat-btn').addEventListener('click', () => {
  ChatRoom.clear();
});

document.getElementById('auto-chat-btn').addEventListener('click', () => {
  if (ChatRoom.isRunning) {
    ChatRoom.stop();
    document.getElementById('auto-chat-btn').textContent = 'Auto Chat';
  } else {
    ChatRoom.start();
    document.getElementById('auto-chat-btn').textContent = 'Stop Chat';
  }
});

document.getElementById('send-btn').addEventListener('click', () => {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  ChatRoom.userMessage(text);
});

document.getElementById('message-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('send-btn').click();
  }
});

document.getElementById('console-clear').addEventListener('click', () => {
  document.getElementById('console-output').innerHTML = '';
});

log('Multi-Pip Chat Room ready. Add pips to begin!', 'info');
</script>
</body>
</html>
